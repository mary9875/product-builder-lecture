<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 로또 & 🐶 동물상 테스트</title>
    <link rel="stylesheet" href="style.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3575705525588194"
     crossorigin="anonymous"></script>
    <meta name="google-adsense-account" content="ca-pub-3575705525588194">
    <!-- Teachable Machine Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>
    <div class="theme-switch-wrapper">
        <label class="theme-switch" for="checkbox">
            <input type="checkbox" id="checkbox" />
            <div class="slider round"></div>
        </label>
        <span id="theme-text">라이트 모드</span>
    </div>

    <div class="container">
        <h1>🎯 로또 번호 생성기</h1>
        <div class="numbers-container">
            <!-- 번호 공이 여기에 생성됩니다 -->
        </div>
        <button id="generate-btn">번호 생성하기</button>
    </div>

    <!-- Animal Face Test Section -->
    <div class="container animal-test">
        <h2>🐶 동물상 테스트 🐱</h2>
        <p class="description">사진을 업로드하여 당신의 동물상을 확인해보세요!</p>
        
        <div id="image-preview-wrapper">
            <img id="face-image" src="#" alt="미리보기" class="hidden">
            <div id="upload-placeholder">사진을 업로드 해주세요</div>
        </div>
        
        <div class="upload-btn-wrapper">
            <label for="image-upload" id="upload-label">사진 업로드</label>
            <input type="file" id="image-upload" accept="image/*">
        </div>
        
        <div id="label-container">
            <!-- 결과 게이지가 여기에 생성됩니다 -->
        </div>
        <div id="result-message"></div>
    </div>

    <div class="container inquiry-form">
        <h2>🤝 제휴 문의</h2>
        <form action="https://formspree.io/f/xqedjaye" method="POST">
            <div class="form-group">
                <label for="name">이름/업체명</label>
                <input type="text" id="name" name="name" required placeholder="이름 또는 업체명을 입력하세요">
            </div>
            <div class="form-group">
                <label for="email">이메일</label>
                <input type="email" id="email" name="_replyto" required placeholder="답변받을 이메일을 입력하세요">
            </div>
            <div class="form-group">
                <label for="subject">문의 제목</label>
                <input type="text" id="subject" name="subject" required placeholder="문의 제목을 입력하세요">
            </div>
            <div class="form-group">
                <label for="message">문의 내용</label>
                <textarea id="message" name="message" required placeholder="상세 내용을 입력하세요"></textarea>
            </div>
            <button type="submit" class="submit-btn">문의 보내기</button>
        </form>
    </div>

    <div class="container disqus-container">
        <h2>💬 댓글 서비스</h2>
        <div id="disqus_thread"></div>
        <script>
            /**
            *  RECOMMENDED CONFIGURATION VARIABLES: EDIT AND UNCOMMENT THE SECTION BELOW TO INSERT DYNAMIC VALUES FROM YOUR PLATFORM OR CMS.
            *  LEARN WHY DEFINING THESE VARIABLES IS IMPORTANT: https://disqus.com/admin/universalcode/#configuration-variables    */

            this.page.url = PAGE_URL;  // Replace PAGE_URL with your page's canonical URL variable
            this.page.identifier = PAGE_IDENTIFIER; // Replace PAGE_IDENTIFIER with your page's unique identifier variable
            };
            */
            (function() { // DON'T EDIT BELOW THIS LINE
            var d = document, s = d.createElement('script');
            s.src = 'https://productbuilder-4dlceqgbtb.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
            })();
        </script>
        <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
    </div>

    <script src="main.js"></script>
</body>
</html>
